document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

45,249,0.7); }\n  #tweaks .cu input[type=color] { width: 36px; height: 28px; border: none; background: transparent; border-radius: 6px; cursor: pointer; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 01 COVER -->\n  <section data-label=\"Cover\" class=\"cover deep\">\n    <div class=\"cover-conf\">Confidential<\u002Fdiv>\n    <div style=\"position:absolute; top:60px; left:100px;\">\n      <div class=\"logo\" style=\"font-size:30px;\">\n        <span class=\"logo-mark\" style=\"width:46px;height:46px;\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        WebPrefer\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute; top:280px; left:100px; right:100px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom:40px;\">Investment Deck · WebPrefer AB · 2026<\u002Fdiv>\n      <h1 class=\"cover-title\">\n        The PAM built<br>\n        for operators who<br>\n        <span class=\"serif-ital\">can't afford to guess.<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size:30px; color: var(--ink-dim); max-width: 38ch; margin: 40px 0 0 0; line-height: 1.32;\">\n        Player Account Management, BeAware behavior engine, CMS, Re-Streaming and AI — a single, production-proven platform for regulated iGaming.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cover-meta\" style=\"bottom: 50px;\">\n      <div class=\"block\"><div>— Prepared by<\u002Fdiv>Mikael Lindberg Castell<br>CEO &amp; Founder<\u002Fdiv>\n      <div class=\"block\"><div>— For<\u002Fdiv>Prospective Investors<br>&amp; Strategic Partners<\u002Fdiv>\n      <div class=\"block\" style=\"text-align:right;\"><div>— Seeking<\u002Fdiv>Series Seed · Growth Round<br>April 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 CONTENTS -->\n  <section data-label=\"Contents\">\n    <div class=\"frame-hdr\"><span><span class=\"dot\"><\u002Fspan>Contents<\u002Fspan><span>02 / 16<\u002Fspan><\u002Fdiv>\n    <div class=\"content-area\">\n      <div class=\"eyebrow\" style=\"margin-bottom:28px;\">What's inside<\u002Fdiv>\n      <h2 class=\"title\" style=\"max-width: 18ch; margin-bottom: 60px;\">A clear path, <span class=\"serif-ital\">start to finish.<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 40px 80px; font-family: 'IBM Plex Mono', monospace; font-size: 30px;\">\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">01<\u002Fspan><span>Problem<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">06<\u002Fspan><span>Market &amp; Competitors<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">02<\u002Fspan><span>Solution<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">07<\u002Fspan><span>Business Model<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">03<\u002Fspan><span>Product &amp; Services<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">08<\u002Fspan><span>Traction &amp; Go-to-Market<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">04<\u002Fspan><span>Why Now<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">09<\u002Fspan><span>Team<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">05<\u002Fspan><span>Track Record<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: baseline;\"><span style=\"color:var(--accent);\">10<\u002Fspan><span>Investment Ask<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"frame-ftr\"><div class=\"logo\"><span class=\"logo-mark\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>WebPrefer<\u002Fdiv><div class=\"cfd\">Confidential<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 PROBLEM -->\n  <section data-label=\"Problem\">\n    <div class=\"frame-hdr\"><span><span class=\"dot\"><\u002Fspan>01 · Problem<\u002Fspan><span>03 / 16<\u002Fspan><\u002Fdiv>\n    <div class=\"content-area\">\n      <div class=\"eyebrow\" style=\"margin-bottom:24px;\">The Problem<\u002Fdiv>\n      <h2 class=\"title\" style=\"max-width: 22ch; margin-bottom: 60px;\">Operators are running regulated businesses on platforms built for <span class=\"serif-ital\">an easier era.<\u002Fspan><\u002Fh2>\n      <ul class=\"dotlist\" style=\"columns: 2; column-gap: 80px;\">\n        <li style=\"break-inside: avoid;\">Generic PAMs weren't designed for today's regulators — compliance is bolted on, not built in<\u002Fli>\n        <li style=\"break-inside: avoid;\">Operator risk &amp; compliance teams work in spreadsheets while the product moves on<\u002Fli>\n        <li style=\"break-inside: avoid;\">Behavior signals arrive in batches — intervention happens hours after the loss<\u002Fli>\n        <li style=\"break-inside: avoid;\">CMS changes require a developer; skin launches take weeks, not hours<\u002Fli>\n        <li style=\"break-inside: avoid;\">Migrating PAMs is considered a bet-the-company project — no one wants to do it<\u002Fli>\n        <li style=\"break-inside: avoid;\">Streaming, retention &amp; Web3 experiments live outside the platform, stitched together<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"frame-ftr\"><div class=\"logo\"><span class=\"logo-mark\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>WebPrefer<\u002Fdiv><div class=\"cfd\">Confidential<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 SOLUTION -->\n  <section data-label=\"Solution\" class=\"deep\">\n    <div class=\"frame-hdr\"><span><span class=\"dot\"><\u002Fspan>02 · Solution<\u002Fspan><span>04 / 16<\u002Fspan><\u002Fdiv>\n    <div class=\"content-area\">\n      <div class=\"eyebrow\" style=\"margin-bottom:24px;\">The Solution<\u002Fdiv>\n      <h2 class=\"title\" style=\"max-width: 22ch; margin-bottom: 48px;\">One platform. Every layer. <span class=\"serif-ital\">Built in production.<\u002Fspan><\u002Fh2>\n      <div class=\"pscols\">\n        <div class=\"pcard\">\n          <div class=\"lbl\">Status Quo<\u002Fdiv>\n          <ul class=\"ps-list\">\n            <li>PAM + compliance + CMS + streaming sourced from 4–5 vendors<\u002Fli>\n            <li>Batch reporting, hours behind reality<\u002Fli>\n            <li>Every market is a migration<\u002Fli>\n            <li>Developers in the way of every skin change<\u002Fli>\n            <li>AI bolted on as a chatbot without product context<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"scard\">\n          <div class=\"lbl\">With WebPrefer<\u002Fdiv>\n          <ul class=\"ps-list\">\n            <li>Single coherent platform — 40+ modules that know about each other<\u002Fli>\n            <li>BeAware: rules fire in real time, on the same event bus as wallets<\u002Fli>\n            <li>Compliance is config — adding a market is not a deployment<\u002Fli>\n            <li>CMS is operator-controlled; developers build what needs building<\u002Fli>\n            <li>AI with live, permission-scoped access to the actual player state<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"frame-ftr\"><div class=\"logo\"><span class=\"logo-mark\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>WebPrefer<\u002Fdiv><div class=\"cfd\">Confidential<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 PRODUCT & SERVICES -->\n  <section data-label=\"Product and Services\">\n    <div class=\"frame-hdr\"><span><span class=\"dot\"><\u002Fspan>03 · Product &amp; Services<\u002Fspan><span>05 / 16<\u002Fspan><\u002Fdiv>\n    <div class=\"content-area\">\n      <div class=\"eyebrow\" style=\"margin-bottom:24px;\">Product &amp; Services<\u002Fdiv>\n      <h2 class=\"title\" style=\"max-width: 20ch; margin-bottom: 48px;\">Five products, one platform.<\u002Fh2>\n      <div class=\"prod-grid\">\n        <div class=\"prod-card\">\n          <div class=\"num\">01<\u002Fdiv>\n          <div class=\"nm\">PAM<\u002Fdiv>\n          <div class=\"ds\">Player Account Management — wallets, bonuses, KYC, audit. The core system of record. Live since 2013. .NET 10.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prod-card\">\n          <div class=\"num\">02<\u002Fdiv>\n          <div class=\"nm\">BeAware<\u002Fdiv>\n          <div class=\"ds\">Real-time behavior engine. Configurable rule trees for deposits, losses, SOW, self-exclusion — no deployments required.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prod-card\">\n          <div class=\"num\">03<\u002Fdiv>\n          <div class=\"nm\">CMS<\u002Fdiv>\n          <div class=\"ds\">Operator-owned content. Menus, pages, skins, promotions — Blazor-based, reactive, shared permission model with the back-office.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prod-card\">\n          <div class=\"num\">04<\u002Fdiv>\n          <div class=\"nm\">Re-Streaming<\u002Fdiv>\n          <div class=\"ds\">One RTMP source — simultaneous broadcast to Twitch, YouTube, Facebook and the operator site. Auto-VOD into CMS. Live with Trustplay.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prod-card\">\n          <div class=\"num\">05<\u002Fdiv>\n          <div class=\"nm\">AI Assistant<\u002Fdiv>\n          <div class=\"ds\">Gemini-powered agent with permission-scoped access to live player state. Not a chatbot — a support tool that answers from production data.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prod-card\" style=\"background: color-mix(in oklab, var(--accent) 14%, var(--bg-panel)); border-color: color-mix(in oklab, var(--accent) 40%, transparent);\">\n          <div class=\"num\" style=\"color:#fff; opacity:0.9;\">+<\u002Fdiv>\n          <div class=\"nm\" style=\"color:#fff;\">Turnkey &amp; Licensing<\u002Fdiv>\n          <div class=\"ds\" style=\"color: rgba(255,255,255,0.78);\">Whitelabel services for operators, or full PAM license for those who need their own — regulated-market ready.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"frame-ftr\"><div class=\"logo\"><span class=\"logo-mark\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>WebPrefer<\u002Fdiv><div class=\"cfd\">Confidential<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 WHY NOW -->\n  <section data-label=\"Why Now\" class=\"light\">\n    <div class=\"frame-hdr\"><span><span class=\"dot\"><\u002Fspan>04 · Why Now<\u002Fspan><span>06 / 16<\u002Fspan><\u002Fdiv>\n    <div class=\"content-area\">\n      <div class=\"eyebrow\" style=\"margin-bottom:24px;\">Why Now<\u002Fdiv>\n      <h2 class=\"title\" style=\"max-width: 22ch; margin-bottom: 60px;\">The market just shifted <span class=\"serif-ital\">in our favor.<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 24px;\">\n        <div class=\"card\"><div class=\"lbl\">Regulators<\u002Fdiv><div class=\"ttl\">Tightening, not loosening<\u002Fdiv><div class=\"bd\">UKGC, Spelinspektionen, DGOJ — real-time intervention is becoming a license requirement, not a nice-to-have.<\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"lbl\">Incumbents<\u002Fdiv><div class=\"ttl\">Legacy platforms are aging out<\u002Fdiv><div class=\"bd\">Most operator PAMs were built before modern observability existed. Replatforming conversations are happening now.<\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"lbl\">AI<\u002Fdiv><div class=\"ttl\">Context is the moat<\u002Fdiv><div class=\"bd\">Any chatbot can answer FAQs. An AI with live player state — permission-scoped, audited — only works if you own the platform.<\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"lbl\">Streaming<\u002Fdiv><div class=\"ttl\">Retention beats acquisition<\u002Fdiv><div class=\"bd\">CAC keeps climbing. Live streaming + re-engagement is where the next LTV points live — operators are actively buying.<\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"lbl\">Web3 ready<\u002Fdiv><div class=\"ttl\">Crypto-native operators<\u002Fdiv><div class=\"bd\">New jurisdictions, new payment rails, same compliance DNA. Our architecture already supports both.<\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"lbl\">Talent cost<\u002Fdiv><div class=\"ttl\">Vietnam engineering<\u002Fdiv><div class=\"bd\">7+ years of compounded, regulated-iGaming context in a low-cost, high-retention engineering base. Hard to replicate.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"frame-ftr\"><div class=\"logo\"><span class=\"logo-mark\"><svg viewBox=\"0 0 122.72 87.39\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M73.3 45.31L99.46 0h21a2.14 2.14 0 0 1 1.9 1.1 2.14 2.14 0 0 1 0 2.19L74.06 87a.88.88 0 0 1-1.52 0L52.86 52.87 33.5 86.4a.88.88 0 0 1-1.52 0L20.33 66.24 58.58 0h24.8L65.26 31.39l8 13.92zm-61 7L.12 31.23a.86.86 0 0 1 0-.88L17.38.46a.86.86 0 0 1 .76-.46h24.3L12.27 52.27z\" fill=\"currentColor\" fill-rule=\"evenodd\"><\u002Fpath><\u002Fsvg><\u002Fspan>WebPrefer<\u002Fdiv><div class=\"cfd\">Confidential<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 TRACK RECORD -->\n  <section data-label=\"Track Record\" class=\"deep\">\n    <div class=\"frame-hdr\"><span><span class=
