<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: '#1968AA' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { margin: 0; width: 1200px; height: 630px; overflow: hidden; font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body style="background: linear-gradient(135deg, #0d3459 0%, #1968AA 60%, #134f82 100%);">
  <div class="flex h-[630px] items-center px-16">
    <div class="flex-1">
      <div class="flex gap-2 mb-5">
        <span class="bg-white/20 text-white text-sm font-semibold px-4 py-1.5 rounded-full">Observability</span>
        <span class="bg-white/20 text-white text-sm font-semibold px-4 py-1.5 rounded-full">DevOps</span>
      </div>
      <h1 class="text-white text-5xl font-extrabold leading-tight mb-5 max-w-2xl">You Can't Fix What You Can't See</h1>
      <p class="text-blue-200 text-xl leading-relaxed max-w-xl mb-8">Distributed tracing across 16+ integrations with OpenTelemetry and .NET Aspire.</p>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center"><span class="text-[#1968AA] font-extrabold text-lg">W</span></div>
        <div>
          <div class="text-white text-sm font-bold">WebPrefer Engineering</div>
          <div class="text-blue-300 text-xs">webprefer.com</div>
        </div>
      </div>
    </div>
    <div class="w-[380px] flex-shrink-0">
      <div class="bg-[#0c1222] rounded-xl border border-white/5 p-6">
        <div class="text-white/40 text-[10px] font-bold uppercase tracking-wider mb-4">Distributed Trace</div>
        <!-- Trace waterfall -->
        <div class="space-y-2">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="text-sky-400 text-[10px] font-bold w-16">API</div>
              <div class="flex-1 relative h-5">
                <div class="absolute left-0 top-0.5 h-4 bg-sky-500/30 border border-sky-500/50 rounded" style="width: 100%"></div>
              </div>
              <div class="text-white/30 text-[9px] w-12 text-right">245ms</div>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="text-amber-400 text-[10px] font-bold w-16">BL</div>
              <div class="flex-1 relative h-5">
                <div class="absolute left-[5%] top-0.5 h-4 bg-amber-500/30 border border-amber-500/50 rounded" style="width: 80%"></div>
              </div>
              <div class="text-white/30 text-[9px] w-12 text-right">198ms</div>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="text-emerald-400 text-[10px] font-bold w-16">DB</div>
              <div class="flex-1 relative h-5">
                <div class="absolute left-[10%] top-0.5 h-4 bg-emerald-500/30 border border-emerald-500/50 rounded" style="width: 25%"></div>
              </div>
              <div class="text-white/30 text-[9px] w-12 text-right">42ms</div>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="text-purple-400 text-[10px] font-bold w-16">Redis</div>
              <div class="flex-1 relative h-5">
                <div class="absolute left-[35%] top-0.5 h-4 bg-purple-500/30 border border-purple-500/50 rounded" style="width: 5%"></div>
              </div>
              <div class="text-white/30 text-[9px] w-12 text-right">3ms</div>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="text-rose-400 text-[10px] font-bold w-16">Provider</div>
              <div class="flex-1 relative h-5">
                <div class="absolute left-[40%] top-0.5 h-4 bg-rose-500/30 border border-rose-500/50 rounded" style="width: 45%"></div>
              </div>
              <div class="text-white/30 text-[9px] w-12 text-right">142ms</div>
            </div>
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-white/5">
          <div class="flex justify-between text-[9px]">
            <span class="text-white/30">TraceId: a1b2c3...f9e8</span>
            <span class="text-white/30">SpanCount: 12</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
