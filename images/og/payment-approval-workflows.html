<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: '#1968AA' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { margin: 0; width: 1200px; height: 630px; overflow: hidden; font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body style="background: linear-gradient(135deg, #0d3459 0%, #1968AA 60%, #134f82 100%);">
  <div class="flex h-[630px] items-center px-16">
    <div class="flex-1">
      <div class="flex gap-2 mb-5">
        <span class="bg-amber-400/30 text-amber-200 text-sm font-semibold px-4 py-1.5 rounded-full">Payments</span>
        <span class="bg-green-400/30 text-green-200 text-sm font-semibold px-4 py-1.5 rounded-full">Compliance</span>
      </div>
      <h1 class="text-white text-5xl font-extrabold leading-tight mb-5 max-w-2xl">When Your Player's Deposit Needs Human Eyes</h1>
      <p class="text-blue-200 text-xl leading-relaxed max-w-xl mb-8">Multi-stage payment workflows with fraud prevention that doesn't bottleneck.</p>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center"><span class="text-[#1968AA] font-extrabold text-lg">W</span></div>
        <div><div class="text-white text-sm font-bold">WebPrefer Engineering</div><div class="text-blue-300 text-xs">webprefer.com</div></div>
      </div>
    </div>
    <div class="w-[380px] flex-shrink-0">
      <div class="bg-[#0c1222] rounded-xl border border-white/10 p-5">
        <div class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-4">Withdrawal State Machine</div>
        <div class="space-y-2">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-blue-400 flex-shrink-0"></div>
            <div class="flex-1 bg-blue-500/10 border border-blue-500/20 rounded-lg px-3 py-2"><span class="text-blue-300 text-xs font-semibold">Requested</span></div>
          </div>
          <div class="flex items-center gap-3 pl-1.5"><div class="w-px h-4 bg-gray-700"></div></div>
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-amber-400 flex-shrink-0"></div>
            <div class="flex-1 bg-amber-500/10 border border-amber-500/20 rounded-lg px-3 py-2"><span class="text-amber-300 text-xs font-semibold">Pending Review</span></div>
          </div>
          <div class="flex items-center gap-3 pl-1.5"><div class="w-px h-4 bg-gray-700"></div></div>
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-emerald-400 flex-shrink-0"></div>
            <div class="flex-1 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2"><span class="text-emerald-300 text-xs font-semibold">Approved</span></div>
          </div>
          <div class="flex items-center gap-3 pl-1.5"><div class="w-px h-4 bg-gray-700"></div></div>
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-brand flex-shrink-0"></div>
            <div class="flex-1 bg-brand/10 border border-brand/20 rounded-lg px-3 py-2"><span class="text-blue-300 text-xs font-semibold">Processing</span></div>
          </div>
          <div class="flex items-center gap-3 pl-1.5"><div class="w-px h-4 bg-gray-700"></div></div>
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-emerald-400 flex-shrink-0"></div>
            <div class="flex-1 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2"><span class="text-emerald-300 text-xs font-semibold">Completed</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
