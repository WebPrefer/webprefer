<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3459"/>
      <stop offset="100%" stop-color="#1968AA"/>
    </linearGradient>
  </defs>

  <rect width="900" height="480" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="2">REAL-TIME ARCHITECTURE</text>
  <text x="450" y="66" text-anchor="middle" fill="white" font-size="18" font-weight="700">Polling vs Event-Driven Push</text>

  <!-- TOP HALF: Polling -->
  <rect x="40" y="90" width="820" height="155" rx="12" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="70" y="115" fill="#fca5a5" font-size="12" font-weight="700">Polling Model (30s interval)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="175" x2="830" y2="175" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- Event happens -->
  <circle cx="200" cy="145" r="6" fill="#fbbf24"/>
  <text x="200" y="135" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Balance changes</text>
  <line x1="200" y1="151" x2="200" y2="172" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Poll ticks -->
  <line x1="120" y1="168" x2="120" y2="182" stroke="white" stroke-width="2" opacity="0.3"/>
  <text x="120" y="196" text-anchor="middle" fill="white" font-size="7" opacity="0.4">poll</text>
  <line x1="280" y1="168" x2="280" y2="182" stroke="white" stroke-width="2" opacity="0.3"/>
  <text x="280" y="196" text-anchor="middle" fill="white" font-size="7" opacity="0.4">poll</text>
  <line x1="440" y1="168" x2="440" y2="182" stroke="white" stroke-width="2" opacity="0.3"/>
  <text x="440" y="196" text-anchor="middle" fill="white" font-size="7" opacity="0.4">poll</text>
  <line x1="600" y1="168" x2="600" y2="182" stroke="white" stroke-width="2" opacity="0.3"/>
  <text x="600" y="196" text-anchor="middle" fill="white" font-size="7" opacity="0.4">poll</text>

  <!-- Stale gap -->
  <rect x="200" y="156" width="240" height="12" rx="2" fill="#ef4444" opacity="0.2"/>
  <text x="320" y="165" text-anchor="middle" fill="#fca5a5" font-size="8" font-weight="600">STALE DATA — up to 30 seconds</text>

  <!-- Player sees update -->
  <circle cx="440" cy="145" r="6" fill="#ef4444"/>
  <text x="440" y="135" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">Player sees update</text>

  <!-- Wasted polls annotation -->
  <text x="750" y="145" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.7">Constant DB load</text>
  <text x="750" y="160" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.7">even with no changes</text>

  <!-- BOTTOM HALF: Event Push -->
  <rect x="40" y="265" width="820" height="155" rx="12" fill="#16a34a" fill-opacity="0.05" stroke="#16a34a" stroke-width="1" stroke-opacity="0.3"/>
  <text x="70" y="290" fill="#86efac" font-size="12" font-weight="700">Event-Driven Push (SignalR + RabbitMQ)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="350" x2="830" y2="350" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- Event happens -->
  <circle cx="200" cy="320" r="6" fill="#fbbf24"/>
  <text x="200" y="310" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Balance changes</text>
  <line x1="200" y1="326" x2="200" y2="347" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Instant push -->
  <line x1="206" y1="320" x2="256" y2="320" stroke="#86efac" stroke-width="2"/>
  <polygon points="256,315 266,320 256,325" fill="#86efac"/>

  <!-- RabbitMQ -->
  <rect x="270" y="308" width="85" height="24" rx="5" fill="#16a34a" opacity="0.2"/>
  <text x="312" y="324" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">RabbitMQ</text>

  <!-- SignalR -->
  <line x1="355" y1="320" x2="390" y2="320" stroke="#86efac" stroke-width="2"/>
  <polygon points="390,315 400,320 390,325" fill="#86efac"/>
  <rect x="403" y="308" width="75" height="24" rx="5" fill="#16a34a" opacity="0.2"/>
  <text x="440" y="324" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">SignalR</text>

  <!-- Player receives -->
  <line x1="478" y1="320" x2="513" y2="320" stroke="#86efac" stroke-width="2"/>
  <polygon points="513,315 523,320 513,325" fill="#86efac"/>
  <circle cx="540" cy="320" r="6" fill="#16a34a"/>
  <text x="540" y="310" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Player sees update</text>

  <!-- Tiny gap annotation -->
  <rect x="200" y="333" width="340" height="10" rx="2" fill="#16a34a" opacity="0.15"/>
  <text x="370" y="342" text-anchor="middle" fill="#86efac" font-size="7" font-weight="600">~50ms — milliseconds, not seconds</text>

  <!-- No wasted resources -->
  <text x="750" y="320" text-anchor="middle" fill="#86efac" font-size="9" opacity="0.7">Zero polling load</text>
  <text x="750" y="335" text-anchor="middle" fill="#86efac" font-size="9" opacity="0.7">DB reads only on change</text>

  <!-- BeAware parallel path -->
  <line x1="312" y1="332" x2="312" y2="370" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <rect x="260" y="372" width="105" height="24" rx="5" fill="#818cf8" opacity="0.15"/>
  <text x="312" y="388" text-anchor="middle" fill="#c4b5fd" font-size="8" font-weight="600">BeAware rules</text>
  <text x="312" y="405" text-anchor="middle" fill="#c4b5fd" font-size="7" opacity="0.7">fire instantly on event</text>

  <!-- Comparison label -->
  <rect x="310" y="435" width="280" height="30" rx="6" fill="white" opacity="0.06"/>
  <text x="450" y="455" text-anchor="middle" fill="white" font-size="10" font-weight="600">Real-time isn't a feature — it's a different class of product</text>
</svg>
