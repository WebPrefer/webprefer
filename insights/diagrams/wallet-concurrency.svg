<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3459"/>
      <stop offset="100%" stop-color="#1968AA"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="2">THE WALLET PROBLEM</text>
  <text x="450" y="72" text-anchor="middle" fill="white" font-size="18" font-weight="700">Race Condition in Read-Modify-Write</text>

  <!-- Timeline labels -->
  <text x="60" y="120" fill="#93c5fd" font-size="11" font-weight="600">TIME</text>
  <line x1="60" y1="130" x2="60" y2="400" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Request A column -->
  <text x="250" y="110" text-anchor="middle" fill="white" font-size="13" font-weight="700">Request A</text>
  <text x="250" y="125" text-anchor="middle" fill="#93c5fd" font-size="10">(Withdrawal)</text>

  <!-- Request B column -->
  <text x="650" y="110" text-anchor="middle" fill="white" font-size="13" font-weight="700">Request B</text>
  <text x="650" y="125" text-anchor="middle" fill="#93c5fd" font-size="10">(Bonus Credit)</text>

  <!-- Wallet state column -->
  <text x="450" y="110" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Wallet</text>
  <text x="450" y="125" text-anchor="middle" fill="#fbbf24" font-size="10">Balance: 1,000 SEK</text>

  <!-- Step 1: Both read -->
  <rect x="130" y="150" width="240" height="36" rx="8" fill="white" opacity="0.12"/>
  <text x="250" y="173" text-anchor="middle" fill="white" font-size="11" font-weight="500">READ balance → 1,000 SEK</text>

  <rect x="530" y="165" width="240" height="36" rx="8" fill="white" opacity="0.12"/>
  <text x="650" y="188" text-anchor="middle" fill="white" font-size="11" font-weight="500">READ balance → 1,000 SEK</text>

  <!-- Danger zone -->
  <rect x="100" y="145" width="700" height="65" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.3"/>
  <text x="860" y="182" text-anchor="end" fill="#fca5a5" font-size="9" font-weight="600">RACE WINDOW</text>

  <!-- Step 2: Both validate -->
  <rect x="130" y="225" width="240" height="36" rx="8" fill="white" opacity="0.12"/>
  <text x="250" y="248" text-anchor="middle" fill="white" font-size="11" font-weight="500">CHECK: 1,000 ≥ 800? ✓</text>

  <rect x="530" y="235" width="240" height="36" rx="8" fill="white" opacity="0.12"/>
  <text x="650" y="258" text-anchor="middle" fill="white" font-size="11" font-weight="500">CREDIT: 1,000 + 200 = 1,200</text>

  <!-- Step 3: Both commit -->
  <rect x="130" y="290" width="240" height="36" rx="8" fill="#ef4444" opacity="0.2"/>
  <text x="250" y="313" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">WRITE balance = 200</text>

  <rect x="530" y="300" width="240" height="36" rx="8" fill="#ef4444" opacity="0.2"/>
  <text x="650" y="323" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">WRITE balance = 1,200</text>

  <!-- Result -->
  <rect x="200" y="365" width="500" height="48" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="386" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">LOST UPDATE: Last write wins — one operation's result is silently lost</text>
  <text x="450" y="403" text-anchor="middle" fill="#fca5a5" font-size="10">Wallet shows 1,200 but 800 was already withdrawn</text>

  <!-- Fix label -->
  <rect x="200" y="425" width="500" height="36" rx="10" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">FIX: Optimistic concurrency — check RowVersion before WRITE, retry on conflict</text>

  <!-- Arrows -->
  <line x1="250" y1="186" x2="250" y2="225" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="201" x2="650" y2="235" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="261" x2="250" y2="290" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="271" x2="650" y2="300" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
