<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: '#1968AA' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { margin: 0; width: 1200px; height: 630px; overflow: hidden; font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body style="background: linear-gradient(135deg, #0d3459 0%, #1968AA 60%, #134f82 100%);">
  <div class="flex h-[630px] items-center px-16">
    <div class="flex-1">
      <div class="flex gap-2 mb-5">
        <span class="bg-white/20 text-white text-sm font-semibold px-4 py-1.5 rounded-full">Event-Driven</span>
        <span class="bg-white/20 text-white text-sm font-semibold px-4 py-1.5 rounded-full">BeAware</span>
      </div>
      <h1 class="text-white text-5xl font-extrabold leading-tight mb-5 max-w-2xl">BeAware: Rules at Scale</h1>
      <p class="text-blue-200 text-xl leading-relaxed max-w-xl mb-8">Building a behavioral rules engine that reacts to millions of player events in real-time.</p>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center"><span class="text-[#1968AA] font-extrabold text-lg">W</span></div>
        <div>
          <div class="text-white text-sm font-bold">WebPrefer Engineering</div>
          <div class="text-blue-300 text-xs">webprefer.com</div>
        </div>
      </div>
    </div>
    <div class="w-[380px] flex-shrink-0">
      <div class="bg-[#0c1222] rounded-xl border border-white/5 p-6">
        <!-- Event -->
        <div class="bg-sky-500/15 border border-sky-500/30 rounded-lg p-4 text-center mb-3">
          <div class="text-sky-400 text-xs font-bold mb-1">EVENT</div>
          <div class="text-white/50 text-[10px]">Player deposited $500</div>
        </div>
        <div class="flex justify-center mb-3">
          <svg width="20" height="28" viewBox="0 0 20 28"><path d="M10 0 L10 22 M4 16 L10 22 L16 16" stroke="#38bdf8" stroke-width="2" fill="none"/></svg>
        </div>
        <!-- Condition -->
        <div class="bg-amber-500/15 border border-amber-500/30 rounded-lg p-4 text-center mb-3">
          <div class="text-amber-400 text-xs font-bold mb-1">CONDITION</div>
          <div class="text-white/50 text-[10px]">3rd deposit today &amp; total &gt; $1,000</div>
        </div>
        <div class="flex justify-center mb-3">
          <svg width="20" height="28" viewBox="0 0 20 28"><path d="M10 0 L10 22 M4 16 L10 22 L16 16" stroke="#f59e0b" stroke-width="2" fill="none"/></svg>
        </div>
        <!-- Action -->
        <div class="bg-emerald-500/15 border border-emerald-500/30 rounded-lg p-4 text-center">
          <div class="text-emerald-400 text-xs font-bold mb-1">ACTION</div>
          <div class="text-white/50 text-[10px]">Send alert + apply cooling-off</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
