<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3459"/>
      <stop offset="100%" stop-color="#1968AA"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="2">BEAWARE BEHAVIOR ENGINE</text>
  <text x="450" y="66" text-anchor="middle" fill="white" font-size="18" font-weight="700">Configurable Rule Tree</text>

  <!-- Event trigger node -->
  <rect x="50" y="190" width="160" height="60" rx="10" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
  <text x="130" y="215" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">EVENT</text>
  <text x="130" y="233" text-anchor="middle" fill="#fbbf24" font-size="9">DepositCompleted</text>

  <!-- Arrow from event to condition 1 -->
  <line x1="210" y1="205" x2="285" y2="155" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow from event to condition 2 -->
  <line x1="210" y1="225" x2="285" y2="260" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Condition node 1: Sweden + amount > 5000 -->
  <rect x="290" y="118" width="180" height="66" rx="10" fill="#818cf8" opacity="0.2" stroke="#818cf8" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">CONDITION</text>
  <text x="380" y="156" text-anchor="middle" fill="#c4b5fd" font-size="9">jurisdiction == "SE"</text>
  <text x="380" y="172" text-anchor="middle" fill="#c4b5fd" font-size="9">amount > 5,000 SEK</text>

  <!-- Condition node 2: Any brand + first deposit -->
  <rect x="290" y="228" width="180" height="66" rx="10" fill="#818cf8" opacity="0.2" stroke="#818cf8" stroke-width="1.5"/>
  <text x="380" y="250" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">CONDITION</text>
  <text x="380" y="266" text-anchor="middle" fill="#c4b5fd" font-size="9">isFirstDeposit == true</text>
  <text x="380" y="282" text-anchor="middle" fill="#c4b5fd" font-size="9">bonusOptIn == true</text>

  <!-- Arrow from condition 1 to actions -->
  <line x1="470" y1="145" x2="545" y2="112" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="155" x2="545" y2="162" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="165" x2="545" y2="212" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from condition 2 to actions -->
  <line x1="470" y1="255" x2="545" y2="290" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="270" x2="545" y2="340" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Action nodes (SOW path) -->
  <rect x="550" y="90" width="155" height="40" rx="8" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="628" y="108" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Flag SOW Review</text>
  <text x="628" y="122" text-anchor="middle" fill="#86efac" font-size="8">Priority: 1</text>

  <rect x="550" y="142" width="155" height="40" rx="8" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="628" y="160" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Notify Compliance</text>
  <text x="628" y="174" text-anchor="middle" fill="#86efac" font-size="8">via SendGrid</text>

  <rect x="550" y="194" width="155" height="40" rx="8" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="628" y="212" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Freeze Withdrawal</text>
  <text x="628" y="226" text-anchor="middle" fill="#86efac" font-size="8">pending review</text>

  <!-- Action nodes (bonus path) -->
  <rect x="550" y="272" width="155" height="40" rx="8" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="628" y="290" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Credit Welcome Bonus</text>
  <text x="628" y="304" text-anchor="middle" fill="#86efac" font-size="8">100% match, max 1000</text>

  <rect x="550" y="322" width="155" height="40" rx="8" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="628" y="340" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Update CRM Segment</text>
  <text x="628" y="354" text-anchor="middle" fill="#86efac" font-size="8">via FastTrack</text>

  <!-- Log output -->
  <line x1="705" y1="110" x2="755" y2="410" stroke="#93c5fd" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="705" y1="162" x2="755" y2="410" stroke="#93c5fd" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="705" y1="214" x2="755" y2="410" stroke="#93c5fd" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="705" y1="292" x2="755" y2="410" stroke="#93c5fd" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="705" y1="342" x2="755" y2="410" stroke="#93c5fd" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <rect x="730" y="400" width="140" height="40" rx="8" fill="white" fill-opacity="0.08" stroke="#93c5fd" stroke-width="1" stroke-opacity="0.3"/>
  <text x="800" y="418" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Audit Log</text>
  <text x="800" y="432" text-anchor="middle" fill="#93c5fd" font-size="8">Every action logged</text>

  <!-- Legend -->
  <rect x="50" y="390" width="12" height="12" rx="3" fill="#fbbf24" opacity="0.3"/>
  <text x="68" y="401" fill="white" font-size="9" opacity="0.6">Event Trigger</text>
  <rect x="160" y="390" width="12" height="12" rx="3" fill="#818cf8" opacity="0.3"/>
  <text x="178" y="401" fill="white" font-size="9" opacity="0.6">Condition Filter</text>
  <rect x="280" y="390" width="12" height="12" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="298" y="401" fill="white" font-size="9" opacity="0.6">Action</text>

  <!-- Graph editor note -->
  <rect x="50" y="430" width="420" height="30" rx="6" fill="white" opacity="0.06"/>
  <text x="260" y="450" text-anchor="middle" fill="#93c5fd" font-size="10">Built with a visual graph editor — operators drag and connect nodes, no code required</text>
</svg>
