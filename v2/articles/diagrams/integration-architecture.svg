<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3459"/>
      <stop offset="100%" stop-color="#1968AA"/>
    </linearGradient>
  </defs>

  <rect width="900" height="480" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="2">INTEGRATION ARCHITECTURE</text>
  <text x="450" y="66" text-anchor="middle" fill="white" font-size="18" font-weight="700">50+ Providers, Zero Coupling</text>

  <!-- Center: Platform Core -->
  <circle cx="450" cy="260" r="70" fill="#1968AA" opacity="0.3" stroke="white" stroke-width="2"/>
  <circle cx="450" cy="260" r="50" fill="#1968AA" opacity="0.5" stroke="white" stroke-width="1.5"/>
  <text x="450" y="252" text-anchor="middle" fill="white" font-size="12" font-weight="700">PAM</text>
  <text x="450" y="268" text-anchor="middle" fill="white" font-size="12" font-weight="700">Core</text>
  <text x="450" y="284" text-anchor="middle" fill="#93c5fd" font-size="8">Contracts only</text>

  <!-- Contract ring label -->
  <text x="450" y="172" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600" opacity="0.7">IPaymentProvider · IGameProvider · ICommsProvider</text>

  <!-- Payment modules (top-left) -->
  <rect x="80" y="100" width="120" height="44" rx="8" fill="white" opacity="0.1" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="140" y="120" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">PaymentIQ</text>
  <text x="140" y="134" text-anchor="middle" fill="#fbbf24" font-size="8" opacity="0.7">Payment</text>
  <line x1="200" y1="125" x2="390" y2="240" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

  <rect x="220" y="85" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="275" y="105" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Hexopay</text>
  <text x="275" y="119" text-anchor="middle" fill="#fbbf24" font-size="8" opacity="0.7">Payment</text>
  <line x1="310" y1="129" x2="420" y2="220" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

  <rect x="100" y="172" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="155" y="192" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">WorldLine</text>
  <text x="155" y="206" text-anchor="middle" fill="#fbbf24" font-size="8" opacity="0.7">Payment</text>
  <line x1="210" y1="195" x2="390" y2="250" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

  <!-- Game modules (top-right) -->
  <rect x="620" y="85" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#86efac" stroke-width="1.5"/>
  <text x="675" y="105" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">SportTech</text>
  <text x="675" y="119" text-anchor="middle" fill="#86efac" font-size="8" opacity="0.7">Games</text>
  <line x1="625" y1="129" x2="490" y2="230" stroke="#86efac" stroke-width="1" opacity="0.3"/>

  <rect x="700" y="150" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#86efac" stroke-width="1.5"/>
  <text x="755" y="170" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">PlayStar</text>
  <text x="755" y="184" text-anchor="middle" fill="#86efac" font-size="8" opacity="0.7">Games</text>
  <line x1="700" y1="175" x2="510" y2="245" stroke="#86efac" stroke-width="1" opacity="0.3"/>

  <rect x="740" y="225" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#86efac" stroke-width="1.5"/>
  <text x="795" y="245" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">AleaPlay</text>
  <text x="795" y="259" text-anchor="middle" fill="#86efac" font-size="8" opacity="0.7">Games</text>
  <line x1="740" y1="248" x2="520" y2="260" stroke="#86efac" stroke-width="1" opacity="0.3"/>

  <!-- Comms modules (bottom-left) -->
  <rect x="60" y="310" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="115" y="330" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Twilio</text>
  <text x="115" y="344" text-anchor="middle" fill="#c4b5fd" font-size="8" opacity="0.7">SMS</text>
  <line x1="170" y1="333" x2="390" y2="280" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>

  <rect x="190" y="360" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="245" y="380" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">SendGrid</text>
  <text x="245" y="394" text-anchor="middle" fill="#c4b5fd" font-size="8" opacity="0.7">Email</text>
  <line x1="300" y1="375" x2="420" y2="300" stroke="#c4b5fd" stroke-width="1" opacity="0.3"/>

  <!-- CRM/Other modules (bottom-right) -->
  <rect x="620" y="340" width="110" height="44" rx="8" fill="white" opacity="0.1" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="675" y="360" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">FastTrack</text>
  <text x="675" y="374" text-anchor="middle" fill="#67e8f9" font-size="8" opacity="0.7">CRM</text>
  <line x1="625" y1="362" x2="500" y2="290" stroke="#67e8f9" stroke-width="1" opacity="0.3"/>

  <rect x="740" y="300" width="120" height="44" rx="8" fill="white" opacity="0.1" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="800" y="320" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">DevCode ID</text>
  <text x="800" y="334" text-anchor="middle" fill="#67e8f9" font-size="8" opacity="0.7">SSO / KYC</text>
  <line x1="740" y1="322" x2="515" y2="275" stroke="#67e8f9" stroke-width="1" opacity="0.3"/>

  <!-- More indicator -->
  <text x="400" y="430" text-anchor="middle" fill="white" font-size="10" opacity="0.5">+ JMJ · St8 · 100HP · Lottoland · Nexmo · Jojka · AWS SES · and more</text>

  <!-- Key insight -->
  <rect x="210" y="445" width="480" height="26" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="462" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Each module is isolated — a provider API change touches only its own module</text>
</svg>
